name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: adhatcher-org/shared-workflows/.github/workflows/app-ci.yml@e6520622447b5a743aab60bba5dc25c95a32cc69 # v1.0.0
    with:
      python-version: "3.14"
      dependency-manager: uv
      project-directory: backend
      use-node: true
      node-version: "22"
      node-directory: frontend
      run-lint: true
      run-typecheck: false
      run-tests: true
      run-coverage: true
      run-security: true
      run-docker-build: true
