name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: adhatcher-org/shared-workflows/.github/workflows/app-ci.yml@8189d4131e5b4b78d9b6f947e4a3bc8a28d4fdc8 # v1.0.1
    with:
      python-version: "3.14"
      dependency-manager: uv
      project-directory: backend
      use-node: true
      node-version: "22"
      node-directory: frontend
      run-lint: true
      run-typecheck: false
      run-tests: true
      run-coverage: true
      run-security: true
      run-docker-build: true
