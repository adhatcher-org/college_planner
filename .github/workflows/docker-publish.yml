name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RELEASE_TIMEZONE: America/New_York
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-only:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build Docker image without publishing
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push:
    if: >
      github.event_name == 'push' ||
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: docker-publish-main
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date
        id: date
        run: echo "date=$(TZ='${{ env.RELEASE_TIMEZONE }}' date +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"

      - name: Get latest build number and increment
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_DATE=${{ steps.date.outputs.date }}
          OWNER="${{ github.repository_owner }}"
          PACKAGE="${{ github.event.repository.name }}"

          GIT_TAGS=$(git ls-remote --tags "https://github.com/${{ github.repository }}.git" | \
            grep -oP "$CURRENT_DATE-\d+" || true)

          PACKAGE_TAGS=$(
            gh api --paginate "/users/$OWNER/packages/container/$PACKAGE/versions" --jq '.[] | .metadata.container.tags[]?' 2>/dev/null ||
            gh api --paginate "/orgs/$OWNER/packages/container/$PACKAGE/versions" --jq '.[] | .metadata.container.tags[]?' 2>/dev/null ||
            true
          )

          LATEST_TAG=$(printf '%s\n%s\n' "$GIT_TAGS" "$PACKAGE_TAGS" | \
            grep -oP "^$CURRENT_DATE-\K\d+$" | \
            sort -n | \
            tail -1)

          if [ -z "$LATEST_TAG" ]; then
            BUILD_NUMBER=1
          else
            BUILD_NUMBER=$((LATEST_TAG + 1))
          fi

          NEW_TAG="$CURRENT_DATE-$BUILD_NUMBER"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New tag will be: $NEW_TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.new_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git tag for Docker image version
        run: |
          git tag "${{ steps.tag.outputs.new_tag }}"
          git push origin "refs/tags/${{ steps.tag.outputs.new_tag }}"
